<!doctype html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Teacher Login</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="auth-page d-flex justify-content-center align-items-center">
    <div class="card glass auth-card auth-shell">
        <p class="auth-eyebrow">StudyIntel</p>
        <h3 class="auth-title">Teacher Login</h3>
        <p class="auth-subtitle">Manage your class with the same calm, focused workspace.</p>

        <form method="POST">
            <input class="form-control mb-3" name="username" placeholder="Username" required>
            <input
                class="form-control mb-3"
                name="password"
                type="password"
                placeholder="Password"
                required
            >

            <button class="btn btn-primary w-100">Login</button>
        </form>

        <div class="auth-links">
            <a href="/login">Student Login</a> |
            <a href="/teacher_register">Create Teacher Account</a>
        </div>
    </div>
</body>
</html>
