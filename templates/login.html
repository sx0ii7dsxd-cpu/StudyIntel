<!doctype html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
  </head>

  <body class="auth-page d-flex justify-content-center align-items-center">
    <div class="card glass auth-card auth-shell">
      <p class="auth-eyebrow">StudyIntel</p>
      <h3 class="auth-title">Student Login</h3>
      <p class="auth-subtitle">Pick up your study flow right where you left it.</p>

      <form method="POST">
        <input
          class="form-control mb-3"
          name="username"
          placeholder="Username"
          required
        />
        <input
          class="form-control mb-3"
          name="password"
          type="password"
          placeholder="Password"
          required
        />

        <button class="btn btn-primary w-100">Login</button>
      </form>

      <div class="auth-links">
        <a href="/register">Register</a> |
        <a href="/teacher_login">Teacher Login</a>
      </div>
    </div>
  </body>
</html>
