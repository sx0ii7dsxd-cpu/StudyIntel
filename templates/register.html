<!DOCTYPE html>
<html>
<head>
    <title>Register</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="auth-page d-flex justify-content-center align-items-center">
    <div class="card glass auth-card auth-shell">
        <p class="auth-eyebrow">StudyIntel</p>
        <h3 class="auth-title">Student Register</h3>
        <p class="auth-subtitle">Join your class and start building better study habits.</p>

        <form method="POST">
            <input class="form-control mb-3" name="username" placeholder="Username" required>
            <input
                class="form-control mb-3"
                name="password"
                type="password"
                placeholder="Password"
                required
            >
            <input class="form-control mb-3" name="class_code" placeholder="Class Code" required>

            <button class="btn btn-success w-100">Register</button>
        </form>

        <div class="auth-links">
            <a href="/login">Back to Login</a>
        </div>
    </div>
</body>
</html>
