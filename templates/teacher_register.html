<!DOCTYPE html>
<html>
<head>
    <title>Teacher Register</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="auth-page d-flex justify-content-center align-items-center">
    <div class="card glass teacher-register-card auth-shell">
        <p class="auth-eyebrow">StudyIntel</p>
        <h3 class="auth-title">Teacher Register</h3>
        <p class="auth-subtitle">Create your teaching workspace and invite students with one class code.</p>

        <form method="POST">
            <input class="form-control mb-2" name="username" placeholder="Username" required>
            <input
                class="form-control mb-2"
                name="password"
                type="password"
                placeholder="Password"
                required
            >

            <input class="form-control mb-2" name="full_name" placeholder="Full Name" required>
            <input class="form-control mb-2" name="email" placeholder="Email" required>
            <input class="form-control mb-2" name="phone" placeholder="Phone" required>
            <input class="form-control mb-2" name="address" placeholder="Address" required>
            <input class="form-control mb-2" name="aadhaar" placeholder="Aadhaar" required>

            <input class="form-control mb-3" name="secret_code" placeholder="Secret Code" required>

            <button class="btn btn-primary w-100">Register</button>
        </form>

        <div class="auth-links">
            <a href="/login">Back</a>
        </div>
    </div>
</body>
</html>
