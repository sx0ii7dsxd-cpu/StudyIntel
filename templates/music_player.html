<!doctype html>
<html>
  <head>
    <title>StudyIntel Music Player</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='music_player.css') }}"
    />
    <script>
      function applyTheme(theme) {
        document.documentElement.setAttribute('data-theme', theme);
        localStorage.setItem('studyintelTheme', theme);
      }
      function openThemeModal() {
        if(document.getElementById('si-theme-modal')) {
             document.getElementById('si-theme-modal').style.display = 'flex';
             return;
        }
        const modalHtml = `
          <div id="si-theme-modal" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); backdrop-filter:blur(10px); z-index:9999; display:flex; align-items:center; justify-content:center;">
             <div style="background:rgba(20, 20, 25, 0.95); padding:30px; border-radius:24px; border:1px solid rgba(255,255,255,0.1); box-shadow:0 30px 60px rgba(0,0,0,0.8); min-width:300px; text-align:center;">
                <h3 style="margin-top:0; color:#fff; font-size:1.4rem; font-weight:800;">Select Theme</h3>
                <div style="display:flex; flex-direction:column; gap:12px; margin-top:20px;">
                   <button onclick="applyThemeAndClose('ocean')" style="padding:16px; border-radius:12px; border:1px solid #1e9dbf; background:linear-gradient(135deg, rgba(30,157,191,0.2), transparent); color:#fff; font-weight:bold; cursor:pointer; text-align:left;">🌊 Ocean Neon</button>
                   <button onclick="applyThemeAndClose('cyber')" style="padding:16px; border-radius:12px; border:1px solid #fcee0a; background:linear-gradient(135deg, rgba(252,238,10,0.2), transparent); color:#fff; font-weight:bold; cursor:pointer; text-align:left;">⚡ Cyber Glitch</button>
                   <button onclick="applyThemeAndClose('eclipse')" style="padding:16px; border-radius:12px; border:1px solid #ff3366; background:linear-gradient(135deg, rgba(255,51,102,0.2), transparent); color:#fff; font-weight:bold; cursor:pointer; text-align:left;">🌇 Sunset Eclipse</button>
                </div>
                <button onclick="document.getElementById('si-theme-modal').style.display='none'" style="margin-top:20px; width:100%; padding:12px; border-radius:12px; border:none; background:rgba(255,255,255,0.1); color:#ccc; cursor:pointer; font-weight:bold;">Cancel</button>
             </div>
          </div>
        `;
        document.body.insertAdjacentHTML('beforeend', modalHtml);
      }
      function applyThemeAndClose(theme) {
         applyTheme(theme);
         document.getElementById('si-theme-modal').style.display = 'none';
      }
      const savedTheme = localStorage.getItem('studyintelTheme') || 'ocean';
      applyTheme(savedTheme);

      window.addEventListener('storage', (e) => {
        if (e.key === 'studyintelTheme') {
          document.documentElement.setAttribute('data-theme', e.newValue);
        }
      });
    </script>
  </head>
  <body>
    <div class="player-shell" style="position: relative;">
      <button onclick="openThemeModal()" class="btn btn-sm btn-secondary" style="position: absolute; top: 20px; right: 28px; background: rgba(255,255,255,0.1); border:none; border-radius:12px; color:#fff; padding:6px 12px; font-size:12px; cursor:pointer;" aria-label="Toggle Theme">🎨 Theme</button>
      <div class="spotify-header">
        <div class="cover-art">
          <svg viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"><path d="M9 18V5l12-2v13"></path><circle cx="6" cy="18" r="3"></circle><circle cx="18" cy="16" r="3"></circle></svg>
        </div>
        <div class="track-details">
          <h1 id="playerTrack" class="track">5:32pm</h1>
          <p class="eyebrow">Study Music</p>
        </div>
      </div>

      <div class="player-controls">
        <div class="controls-main">
          <!-- Prev -->
          <button id="prevButton" class="icon-btn" type="button" aria-label="Previous">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
          </button>
          
          <!-- Play -->
          <button id="playButton" class="play-circle-btn" type="button" aria-label="Play">
            <svg id="playIcon" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
          </button>
          
          <!-- Next -->
          <button id="nextButton" class="icon-btn" type="button" aria-label="Next">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
          </button>
          
          <!-- Repeat -->
          <button id="repeatButton" class="icon-btn" type="button" aria-label="Repeat">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="17 1 21 5 17 9"></polyline>
              <path d="M3 11V9a4 4 0 0 1 4-4h14"></path>
              <polyline points="7 23 3 19 7 15"></polyline>
              <path d="M21 13v2a4 4 0 0 1-4 4H3"></path>
            </svg>
          </button>
        </div>

        <div class="scrubber-row">
          <span id="currentTime">0:00</span>
          <input id="progressBar" class="range-slider" type="range" min="0" max="100" value="0" />
          <span id="durationTime">0:00</span>
        </div>
      </div>

      <div class="bottom-tools">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
        <input id="volumeSlider" class="range-slider" type="range" min="0" max="100" value="35" />
      </div>

      <p id="playerStatus" class="status" style="display:none;">Open this tab once.</p>
      <div id="playlistList" class="playlist"></div>
    </div>

    <audio id="persistentPlayer"></audio>

    <script>
      const musicChannel = new BroadcastChannel("studyintel-music-control");
      const player = document.getElementById("persistentPlayer");
      const playerTrack = document.getElementById("playerTrack");
      const playerStatus = document.getElementById("playerStatus");
      const playButton = document.getElementById("playButton");
      const nextButton = document.getElementById("nextButton");
      const prevButton = document.getElementById("prevButton");
      const repeatButton = document.getElementById("repeatButton");
      const volumeSlider = document.getElementById("volumeSlider");
      const progressBar = document.getElementById("progressBar");
      const currentTimeEl = document.getElementById("currentTime");
      const durationTimeEl = document.getElementById("durationTime");
      const playIcon = document.getElementById("playIcon");
      const playlistList = document.getElementById("playlistList");
      const storageKey = "studyintelMusicWindowState";
      const playlist = [
        {
          title: "5:32pm",
          src: "{{ url_for('static', filename='music/5_32pm_spotdown.org.mp3') }}",
        },
        {
          title: "Sakura Trees",
          src: "{{ url_for('static', filename='music/Sakura Trees_spotdown.org.mp3') }}",
        },
        {
          title: "Snowman",
          src: "{{ url_for('static', filename='music/Snowman_spotdown.org.mp3') }}",
        },
        {
          title: "With U",
          src: "{{ url_for('static', filename='music/With U_spotdown.org.mp3') }}",
        },
        {
          title: "My New Love",
          src: "{{ url_for('static', filename='music/my new love_spotdown.org.mp3') }}",
        },
      ];

      let currentTrackIndex = 0;
      let pendingAutoplay = false;

      function renderPlaylist() {
        playlistList.innerHTML = "";

        playlist.forEach((track, index) => {
          const item = document.createElement("div");
          item.className =
            "playlist-item" + (index === currentTrackIndex ? " active" : "");
          item.innerText = `${index + 1}. ${track.title}`;
          playlistList.appendChild(item);
        });
      }

      function buildState() {
        return {
          trackTitle: playlist[currentTrackIndex].title,
          currentTrackIndex,
          currentTime: player.currentTime || 0,
          volume: player.volume,
          isPlaying: !player.paused,
        };
      }

      function broadcastState() {
        const state = buildState();
        localStorage.setItem(storageKey, JSON.stringify(state));
        musicChannel.postMessage({
          action: "state-update",
          state,
        });
        playerTrack.innerText = state.trackTitle;
        volumeSlider.value = String(Math.round(state.volume * 100));
        renderPlaylist();
      }

      function loadTrack(index, options = {}) {
        const { preserveTime = 0, autoplay = false } = options;
        currentTrackIndex = index;
        pendingAutoplay = autoplay;
        player.src = playlist[currentTrackIndex].src;
        player.load();
        playerTrack.innerText = playlist[currentTrackIndex].title;
        renderPlaylist();

        player.addEventListener(
          "loadedmetadata",
          () => {
            if (preserveTime > 0) {
              player.currentTime = Math.min(preserveTime, player.duration || preserveTime);
            }
            broadcastState();
          },
          { once: true }
        );
      }

      function playCurrentTrack() {
        player.play().catch((error) => {
          console.error("Persistent music playback failed:", error);
          playerStatus.innerText = "Playback was blocked. Press Play again in this tab.";
        });
      }

      function playNextTrack() {
        const nextIndex = (currentTrackIndex + 1) % playlist.length;
        loadTrack(nextIndex, { autoplay: true });
      }

      function restoreState() {
        const rawState = localStorage.getItem(storageKey);
        const defaultVolume = 0.35;

        if (!rawState) {
          player.volume = defaultVolume;
          loadTrack(0);
          broadcastState();
          return;
        }

        try {
          const state = JSON.parse(rawState);
          const restoredIndex =
            Number.isInteger(state.currentTrackIndex) &&
            state.currentTrackIndex >= 0 &&
            state.currentTrackIndex < playlist.length
              ? state.currentTrackIndex
              : 0;

          player.volume = typeof state.volume === "number" ? state.volume : defaultVolume;
          loadTrack(restoredIndex, {
            preserveTime: state.currentTime || 0,
            autoplay: false,
          });
        } catch (error) {
          console.error("Persistent music restore failed:", error);
          player.volume = defaultVolume;
          loadTrack(0);
          broadcastState();
        }
      }

      player.addEventListener("canplay", () => {
        if (!pendingAutoplay) return;
        pendingAutoplay = false;
        playCurrentTrack();
      });

      function formatTime(seconds) {
        if (!seconds || isNaN(seconds)) return "0:00";
        const m = Math.floor(seconds / 60);
        const s = Math.floor(seconds % 60);
        return m + ":" + (s < 10 ? "0" : "") + s;
      }

      function updatePlayButtonIcon() {
         if (player.paused) {
           playIcon.innerHTML = '<path d="M8 5v14l11-7z"/>';
         } else {
           playIcon.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
         }
      }

      function playPrevTrack() {
        if (player.currentTime > 3) {
          player.currentTime = 0;
        } else {
          let nextIndex = currentTrackIndex - 1;
          if (nextIndex < 0) nextIndex = playlist.length - 1;
          loadTrack(nextIndex, { autoplay: true });
        }
      }

      player.addEventListener("timeupdate", () => {
         if(!isNaN(player.duration)) {
             progressBar.value = (player.currentTime / player.duration) * 100 || 0;
             currentTimeEl.innerText = formatTime(player.currentTime);
             durationTimeEl.innerText = formatTime(player.duration);
         }
         broadcastState();
      });

      progressBar.addEventListener("input", () => {
         if(!isNaN(player.duration)) {
             player.currentTime = (progressBar.value / 100) * player.duration;
         }
      });

      player.addEventListener("play", () => { updatePlayButtonIcon(); broadcastState(); });
      player.addEventListener("pause", () => { updatePlayButtonIcon(); broadcastState(); });
      player.addEventListener("ended", playNextTrack);

      playButton.addEventListener("click", () => {
        if (player.paused) {
          playCurrentTrack();
        } else {
          player.pause();
        }
      });

      nextButton.addEventListener("click", playNextTrack);
      prevButton.addEventListener("click", playPrevTrack);

      repeatButton.addEventListener("click", () => {
        player.loop = !player.loop;
        if (player.loop) {
          repeatButton.classList.add("active");
        } else {
          repeatButton.classList.remove("active");
        }
      });

      volumeSlider.addEventListener("input", () => {
        player.volume = Number(volumeSlider.value) / 100;
        broadcastState();
      });

      musicChannel.onmessage = (event) => {
        const { action, volume } = event.data || {};

        if (action === "request-state") {
          broadcastState();
          return;
        }

        if (action === "toggle") {
          if (player.paused) {
            playCurrentTrack();
          } else {
            player.pause();
          }
          return;
        }

        if (action === "set-volume") {
          player.volume = volume;
          broadcastState();
        }
      };

      restoreState();
      renderPlaylist();
    </script>
  </body>
</html>
