<!doctype html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}{% endblock %}</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
    {% block extra_styles %}{% endblock %}
    
    <script>
      function applyTheme(theme) {
        document.documentElement.setAttribute('data-theme', theme);
        localStorage.setItem('studyintelTheme', theme);
      }
      function openThemeModal() {
        if(document.getElementById('si-theme-modal')) {
             document.getElementById('si-theme-modal').style.display = 'flex';
             return;
        }
        const modalHtml = `
          <div id="si-theme-modal" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); backdrop-filter:blur(10px); z-index:9999; display:flex; align-items:center; justify-content:center;">
             <div style="background:rgba(20, 20, 25, 0.95); padding:30px; border-radius:24px; border:1px solid rgba(255,255,255,0.1); box-shadow:0 30px 60px rgba(0,0,0,0.8); min-width:300px; text-align:center;">
                <h3 style="margin-top:0; color:#fff; font-size:1.4rem; font-weight:800;">Select Theme</h3>
                <div style="display:flex; flex-direction:column; gap:12px; margin-top:20px;">
                   <button onclick="applyThemeAndClose('ocean')" style="padding:16px; border-radius:12px; border:1px solid #1e9dbf; background:linear-gradient(135deg, rgba(30,157,191,0.2), transparent); color:#fff; font-weight:bold; cursor:pointer; text-align:left;">🌊 Ocean Neon</button>
                   <button onclick="applyThemeAndClose('cyber')" style="padding:16px; border-radius:12px; border:1px solid #fcee0a; background:linear-gradient(135deg, rgba(252,238,10,0.2), transparent); color:#fff; font-weight:bold; cursor:pointer; text-align:left;">⚡ Cyber Glitch</button>
                   <button onclick="applyThemeAndClose('eclipse')" style="padding:16px; border-radius:12px; border:1px solid #ff3366; background:linear-gradient(135deg, rgba(255,51,102,0.2), transparent); color:#fff; font-weight:bold; cursor:pointer; text-align:left;">🌇 Sunset Eclipse</button>
                </div>
                <button onclick="document.getElementById('si-theme-modal').style.display='none'" style="margin-top:20px; width:100%; padding:12px; border-radius:12px; border:none; background:rgba(255,255,255,0.1); color:#ccc; cursor:pointer; font-weight:bold;">Cancel</button>
             </div>
          </div>
        `;
        document.body.insertAdjacentHTML('beforeend', modalHtml);
      }
      function applyThemeAndClose(theme) {
         applyTheme(theme);
         document.getElementById('si-theme-modal').style.display = 'none';
      }
      const savedTheme = localStorage.getItem('studyintelTheme') || 'ocean';
      applyTheme(savedTheme);

      window.addEventListener('storage', (e) => {
        if (e.key === 'studyintelTheme') {
          document.documentElement.setAttribute('data-theme', e.newValue);
        }
      });
    </script>
  </head>

  <body>
    <nav class="navbar navbar-dark bg-dark px-4 study-navbar">
      <span class="navbar-brand study-navbar-brand">
        <span class="study-navbar-mark" aria-hidden="true"></span>
        <span>{% block navbar_title %}StudyIntel{% endblock %}</span>
      </span>
      <div class="d-flex align-items-center gap-3">
        <button onclick="openThemeModal()" class="btn btn-secondary btn-sm" aria-label="Toggle Theme">🎨 Theme</button>
        {% block navbar_actions %}
        <a href="/logout" class="btn btn-danger btn-sm">Logout</a>
        {% endblock %}
      </div> 
    </nav>

    {% block content %}{% endblock %}

    <div id="floatingTimer" class="floating-timer">
      <p class="floating-timer-label">Study Timer</p>
      <div id="timerDisplay" class="floating-timer-display">00:00</div>

      <div class="floating-timer-controls">
        <button
          onclick="startTimer(event)"
          class="floating-timer-btn floating-timer-btn-primary"
          aria-label="Start timer"
        >
          ▶
        </button>
        <button
          onclick="pauseTimer(event)"
          class="floating-timer-btn"
          aria-label="Pause timer"
        >
          ⏸
        </button>
        <button
          onclick="stopTimer(event)"
          class="floating-timer-btn"
          aria-label="Stop timer"
        >
          ⏹
        </button>
      </div>
    </div>

    <script>
      let currentSeconds = 0;

      function goToStudy() {
        window.location.href = "/study";
      }

      function updateFloating() {
        fetch("/get_active_seconds")
          .then((r) => r.text())
          .then((s) => {
            let sec = parseInt(s) || 0;

            currentSeconds = sec;

            let m = Math.floor(sec / 60);
            let ss = sec % 60;

            let formatted =
              String(m).padStart(2, "0") + ":" + String(ss).padStart(2, "0");

            document.getElementById("timerDisplay").innerText = formatted;
          });
      }

      setInterval(() => {
        if (window.location.pathname === "/study") return;
        updateFloating();
      }, 1000);

      updateFloating();

      function startTimer(e) {
        e.stopPropagation();

        if (typeof start === "function") {
          start();
          return;
        }

        fetch("/start_study");
        updateFloating();
      }

      function pauseTimer(e) {
        e.stopPropagation();

        if (typeof pause === "function") {
          pause();
          return;
        }

        fetch("/pause_study", {
          method: "POST",
        });
        updateFloating();
      }

      function stopTimer(e) {
        e.stopPropagation();

        if (typeof stop === "function") {
          stop();
          return;
        }

        fetch("/stop_study", {
          method: "POST",
        }).then(() => {
          currentSeconds = 0;
          document.getElementById("timerDisplay").innerText = "00:00";
          updateFloating();
        });
      }

      const timer = document.getElementById("floatingTimer");
      let isDragging = false;
      let offsetX;
      let offsetY;

      timer.addEventListener("mousedown", (e) => {
        isDragging = true;
        offsetX = e.clientX - timer.offsetLeft;
        offsetY = e.clientY - timer.offsetTop;
        timer.style.cursor = "grabbing";
      });

      document.addEventListener("mousemove", (e) => {
        if (!isDragging) return;
        timer.style.left = e.clientX - offsetX + "px";
        timer.style.top = e.clientY - offsetY + "px";
        timer.style.right = "auto";
        timer.style.bottom = "auto";
      });

      document.addEventListener("mouseup", () => {
        isDragging = false;
        timer.style.cursor = "grab";
      });

      // Parallax text effect on scroll
      let ticking = false;
      document.addEventListener("scroll", () => {
        if (!ticking) {
          window.requestAnimationFrame(() => {
            const scrolled = window.scrollY;
            document.documentElement.style.setProperty('--scroll-y', `${scrolled}px`);
            ticking = false;
          });
          ticking = true;
        }
      });
    </script>
  </body>
</html>
