<!doctype html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}{% endblock %}</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
    {% block extra_styles %}{% endblock %}
  </head>

  <body>
    <nav class="navbar navbar-dark bg-dark px-4 study-navbar">
      <span class="navbar-brand study-navbar-brand">
        <span class="study-navbar-mark" aria-hidden="true"></span>
        <span>{% block navbar_title %}StudyIntel{% endblock %}</span>
      </span>
      <div class="d-flex align-items-center gap-3">
        {% block navbar_actions %}
        <a href="/logout" class="btn btn-danger btn-sm">Logout</a>
        {% endblock %}
      </div>
    </nav>

    {% block content %}{% endblock %}

    <div id="floatingTimer" class="floating-timer">
      <p class="floating-timer-label">Study Timer</p>
      <div id="timerDisplay" class="floating-timer-display">00:00</div>

      <div class="floating-timer-controls">
        <button
          onclick="startTimer(event)"
          class="floating-timer-btn floating-timer-btn-primary"
          aria-label="Start timer"
        >
          ▶
        </button>
        <button
          onclick="pauseTimer(event)"
          class="floating-timer-btn"
          aria-label="Pause timer"
        >
          ⏸
        </button>
        <button
          onclick="stopTimer(event)"
          class="floating-timer-btn"
          aria-label="Stop timer"
        >
          ⏹
        </button>
      </div>
    </div>

    <script>
      let currentSeconds = 0;

      function goToStudy() {
        window.location.href = "/study";
      }

      function updateFloating() {
        fetch("/get_active_seconds")
          .then((r) => r.text())
          .then((s) => {
            let sec = parseInt(s) || 0;

            currentSeconds = sec;

            let m = Math.floor(sec / 60);
            let ss = sec % 60;

            let formatted =
              String(m).padStart(2, "0") + ":" + String(ss).padStart(2, "0");

            document.getElementById("timerDisplay").innerText = formatted;
          });
      }

      setInterval(() => {
        if (window.location.pathname === "/study") return;
        updateFloating();
      }, 1000);

      updateFloating();

      function startTimer(e) {
        e.stopPropagation();

        if (typeof start === "function") {
          start();
          return;
        }

        fetch("/start_study");
        updateFloating();
      }

      function pauseTimer(e) {
        e.stopPropagation();

        if (typeof pause === "function") {
          pause();
          return;
        }

        fetch("/pause_study", {
          method: "POST",
        });
        updateFloating();
      }

      function stopTimer(e) {
        e.stopPropagation();

        if (typeof stop === "function") {
          stop();
          return;
        }

        fetch("/stop_study", {
          method: "POST",
        }).then(() => {
          currentSeconds = 0;
          document.getElementById("timerDisplay").innerText = "00:00";
          updateFloating();
        });
      }

      const timer = document.getElementById("floatingTimer");
      let isDragging = false;
      let offsetX;
      let offsetY;

      timer.addEventListener("mousedown", (e) => {
        isDragging = true;
        offsetX = e.clientX - timer.offsetLeft;
        offsetY = e.clientY - timer.offsetTop;
        timer.style.cursor = "grabbing";
      });

      document.addEventListener("mousemove", (e) => {
        if (!isDragging) return;
        timer.style.left = e.clientX - offsetX + "px";
        timer.style.top = e.clientY - offsetY + "px";
        timer.style.right = "auto";
        timer.style.bottom = "auto";
      });

      document.addEventListener("mouseup", () => {
        isDragging = false;
        timer.style.cursor = "grab";
      });
    </script>
  </body>
</html>
